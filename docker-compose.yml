services:
  openclaw:
    container_name: openclaw-agent
    build:
      context: .
      dockerfile: bot/Dockerfile
    restart: unless-stopped
    working_dir: /workspace
    environment:
      WORKSPACE: /workspace
      OPENCLAW_MIN_SLEEP: "10"
      OPENCLAW_MAX_SLEEP: "30"
    env_file:
      - .env
    volumes:
      - ./:/workspace
    ports:
      - "18789:18789"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:18789/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
